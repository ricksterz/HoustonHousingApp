name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  # Auto-deploy after a data refresh commits new JSON. Pushes made by a
  # workflow's GITHUB_TOKEN don't trigger `push` events, so the refresh
  # workflows can't fire this directly — workflow_run bridges that gap.
  workflow_run:
    workflows: ["Refresh FRED Macro", "Monthly Data Refresh"]
    types: [completed]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    # For workflow_run, only deploy on a successful refresh; push/dispatch
    # are unaffected (github.event.workflow_run is null for those).
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run build
        working-directory: frontend
        env:
          VITE_STATIC_DATA: "true"
      - uses: actions/upload-pages-artifact@v5
        with:
          path: frontend/dist
          include-hidden-files: true

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
